<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Cadastro</title></head>
<body>
  <h2>Cadastro</h2>
  <form id="formCadastro">
    <input placeholder="Nome completo" name="nome" required><br>
    <input placeholder="Apelido (usuário)" name="apelido" required><br>
    <input type="date" name="nascimento" required><br>
    <input type="email" name="email" required><br>
    <input type="password" name="senha" required><br>
    <button type="submit">Cadastrar</button>
  </form>
  <script src="script.js"></script>
</body>
</html>
